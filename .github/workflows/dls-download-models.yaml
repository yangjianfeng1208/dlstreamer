name: "[DLS] Models sync status check"
run-name: "[DLS] Models sync status check (by @${{ github.actor }} via ${{ github.event_name }})"
on:
  workflow_dispatch:

permissions: {}
env:
  MODELS_PATH: "/home/runner/models"

jobs:
  check-sync-status:
    name: Check models sync status
    runs-on: [arl-ubuntu24]
    permissions:
      contents: read
    steps:
      - name: Analyze models folder
        run: |
          echo "## 📂 Models folder analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -d "${{ env.MODELS_PATH }}" ]; then
            echo "✅ Models folder exists: ${{ env.MODELS_PATH }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # List all files in the models folder
            echo "### Files found:" >> $GITHUB_STEP_SUMMARY
            ls -lh ${{ env.MODELS_PATH }} >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Models folder does not exist: ${{ env.MODELS_PATH }}" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Upload sync log if exists
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #7.0.0
        if: always()
        continue-on-error: true
        with:
          name: sync-log
          path: ${{ env.MODELS_PATH }}/sync.log
          if-no-files-found: ignore

      - name: Check SUCCESS status
        id: check-success
        if: always()
        run: |
          if [ -f "${{ env.MODELS_PATH }}/SUCCESS.txt" ]; then
            echo "## ✅ Sync SUCCESS" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat ${{ env.MODELS_PATH }}/SUCCESS.txt >> $GITHUB_STEP_SUMMARY
            echo "success_found=true" >> $GITHUB_OUTPUT
          else
            echo "success_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Check FAILED status
        id: check-failed
        if: always()
        run: |
          if [ -f "${{ env.MODELS_PATH }}/FAILED.txt" ]; then
            echo "## ❌ Sync FAILED" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat ${{ env.MODELS_PATH }}/FAILED.txt >> $GITHUB_STEP_SUMMARY
            echo "failed_found=true" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "failed_found=false" >> $GITHUB_OUTPUT
          fi

      - name: No status files found
        if: always() && steps.check-success.outputs.success_found == 'false' && steps.check-failed.outputs.failed_found == 'false'
        run: |
          echo "## ⚠️ No status files found" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Neither SUCCESS.txt nor FAILED.txt was found in ${{ env.MODELS_PATH }}" >> $GITHUB_STEP_SUMMARY
